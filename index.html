mapboxgl.accessToken = 'pk.eyJ1IjoiaGFydmFyZHdhbmciLCJhIjoiY21uMmx5dW45MTE3cTJ3cG5uOG1kNml5MSJ9.1C5ZiisSfrafHJe0T4K8Kg';

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/light-v11',
  center: [144.9700, -37.8200],
  zoom: 12
});
map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'bottom-right');

let activeFilters = { cuisine: null, suburb: null, price: null, vibe: null };
let searchQuery = '';
let markers = {};
let activePopup = null;
let highlightedIndex = null;

restaurants.forEach((r, i) => {
  const el = document.createElement('div');
  el.className = 'marker';
  const marker = new mapboxgl.Marker({ element: el, anchor: 'center' })
    .setLngLat([r.lng, r.lat]).addTo(map);
  el.addEventListener('mouseenter', () => {
    if (activePopup) return;
    new mapboxgl.Popup({ offset: 12, closeButton: false, anchor: 'bottom' })
      .setLngLat([r.lng, r.lat])
      .setHTML(`<div class="popup-header"><div class="popup-cuisine">${r.cuisine}</div><div class="popup-name">${r.name}</div></div><div class="popup-body"><div class="popup-suburb">${r.suburb}</div><div class="popup-meta">${r.price} &nbsp;·&nbsp; ${r.vibe}</div></div>`)
      .addTo(map);
  });
  el.addEventListener('mouseleave', () => {
    const popups = document.querySelectorAll('.mapboxgl-popup:not(.mapboxgl-popup-anchor-bottom)');
    document.querySelectorAll('.mapboxgl-popup').forEach(p => { if (!p.querySelector('.mapboxgl-popup-close-button')) p.remove(); });
  });
  el.addEventListener('click', () => { flyTo(r); highlightCard(i); showPopup(r, i); });
  markers[i] = { marker, el };
});

function flyTo(r) { map.flyTo({ center: [r.lng, r.lat], zoom: 15, duration: 800, essential: true }); }

function showPopup(r, i) {
  if (activePopup) activePopup.remove();
  activePopup = new mapboxgl.Popup({ offset: 12, closeButton: true, anchor: 'bottom' })
    .setLngLat([r.lng, r.lat])
    .setHTML(`<div class="popup-header"><div class="popup-cuisine">${r.cuisine}</div><div class="popup-name">${r.name}</div></div><div class="popup-body"><div class="popup-suburb">${r.suburb}</div><div class="popup-meta">${r.price} &nbsp;·&nbsp; ${r.vibe}</div></div>`)
    .addTo(map);
}

function highlightCard(i) {
  if (highlightedIndex !== null) {
    document.querySelector(`.card[data-index="${highlightedIndex}"]`)?.classList.remove('highlighted');
    markers[highlightedIndex]?.el.classList.remove('active');
  }
  highlightedIndex = i;
  const card = document.querySelector(`.card[data-index="${i}"]`);
  if (card) { card.classList.add('highlighted'); card.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
  markers[i]?.el.classList.add('active');
}

function unique(key) { return [...new Set(restaurants.map(r => r[key]))].sort(); }

function buildFilters(containerId, key, values) {
  const wrap = document.getElementById(containerId);
  values.forEach(val => {
    const btn = document.createElement('button');
    btn.className = 'chip'; btn.textContent = val; btn.dataset.key = key;
    btn.addEventListener('click', () => toggleFilter(key, val, btn));
    wrap.appendChild(btn);
  });
}

buildFilters('cuisine-filters', 'cuisine', unique('cuisine'));
buildFilters('suburb-filters', 'suburb', unique('suburb'));
buildFilters('price-filters', 'price', ['$', '$$', '$$$', '$$$$']);
buildFilters('vibe-filters', 'vibe', unique('vibe'));

function toggleFilter(key, val, btn) {
  if (activeFilters[key] === val) { activeFilters[key] = null; btn.classList.remove('active'); }
  else { document.querySelectorAll(`.chip[data-key="${key}"]`).forEach(c => c.classList.remove('active')); activeFilters[key] = val; btn.classList.add('active'); }
  render();
}

function clearAll() {
  activeFilters = { cuisine: null, suburb: null, price: null, vibe: null };
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('search').value = ''; searchQuery = ''; render();
}

document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); render(); });

function render() {
  const hasFilter = Object.values(activeFilters).some(Boolean) || searchQuery;
  document.getElementById('clear-btn').classList.toggle('visible', hasFilter);
  const filtered = restaurants.map((r, i) => ({ ...r, _i: i })).filter(r => {
    for (const [key, val] of Object.entries(activeFilters)) { if (val && r[key] !== val) return false; }
    if (searchQuery) { const hay = `${r.name} ${r.cuisine} ${r.suburb} ${r.vibe} ${r.must_order}`.toLowerCase(); if (!hay.includes(searchQuery)) return false; }
    return true;
  });
  const visibleSet = new Set(filtered.map(r => r._i));
  restaurants.forEach((_, i) => { if (visibleSet.has(i)) markers[i].marker.addTo(map); else markers[i].marker.remove(); });
  const count = filtered.length;
  document.getElementById('results-count').textContent = `${count} place${count !== 1 ? 's' : ''}`;
  document.getElementById('hdr-count').textContent = restaurants.length;
  const list = document.getElementById('card-list');
  list.innerHTML = '';
  if (!filtered.length) { list.innerHTML = `<div class="empty"><div class="empty-headline">No results</div><div class="empty-sub">Adjust filters or search.</div></div>`; return; }
  filtered.forEach((r, pos) => {
    const card = document.createElement('div');
    card.className = 'card'; card.dataset.index = r._i; card.style.animationDelay = `${pos * 20}ms`;
    card.innerHTML = `<div class="card-accent"></div><div class="card-inner"><div class="card-row-top"><span class="card-name">${r.name}</span><span class="card-price">${r.price}</span></div><div class="card-row-mid"><span class="card-tag cuisine">${r.cuisine}</span><span class="card-tag">${r.suburb}</span><span class="card-tag">${r.vibe}</span></div><div class="card-order"><span>Order: </span>${r.must_order}</div></div>`;
    card.addEventListener('click', () => { flyTo(r); highlightCard(r._i); showPopup(r, r._i); });
    list.appendChild(card);
  });
}

map.on('load', render);
</script>
